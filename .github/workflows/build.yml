name: Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v2

      - name: Decode keystores
        env:
          DEBUG_KEYSTORE: ${{ secrets.DEBUG_KEYSTORE }}
          RELEASE_KEYSTORE: ${{ secrets.RELEASE_KEYSTORE }}
        run: |
          mkdir -p app/keystore
          # Remove any whitespace/newlines and decode
          echo "$DEBUG_KEYSTORE" | tr -d '\n\r ' | base64 -d > app/keystore/debug.keystore
          echo "$RELEASE_KEYSTORE" | tr -d '\n\r ' | base64 -d > app/keystore/release.keystore
          # Verify keystores are valid
          keytool -list -v -keystore app/keystore/debug.keystore -storepass ${{ secrets.DEBUG_STORE_PASSWORD }} || echo "Debug keystore invalid"
          keytool -list -v -keystore app/keystore/release.keystore -storepass ${{ secrets.RELEASE_STORE_PASSWORD }} || echo "Release keystore invalid"

      - name: Copy google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            cp app/google-services.json.example app/google-services.json
          fi

      - name: Create local.properties
        run: |
          pwd
          cat > local.properties << EOF
          sdk.dir=$ANDROID_HOME
   
          # LastFM API Keys
          LASTFM_API_KEY=${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET=${{ secrets.LASTFM_SECRET }}
   
          # Debug keystore (relative paths)
          debug.storeFile=keystore/debug.keystore
          debug.storePassword=${{ secrets.DEBUG_STORE_PASSWORD }}
          debug.keyAlias=${{ secrets.DEBUG_KEY_ALIAS }}
          debug.keyPassword=${{ secrets.DEBUG_KEY_PASSWORD }}
   
          # Release keystore (relative paths)
          release.storeFile=keystore/release.keystore
          release.storePassword=${{ secrets.RELEASE_STORE_PASSWORD }}
          release.keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          release.keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
   
          # Persistent Debug keystore
          debug.persistent.storeFile=keystore/debug.keystore
          debug.persistent.storePassword=${{ secrets.DEBUG_STORE_PASSWORD }}
          debug.persistent.keyAlias=${{ secrets.DEBUG_KEY_ALIAS }}
          debug.persistent.keyPassword=${{ secrets.DEBUG_KEY_PASSWORD }}
          EOF

      - name: Build FossUniversalRelease APK
        run: |
          cat > settings.gradle.kts << 'KOTLIN'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id("org.gradle.toolchains.foojay-resolver-convention") version "1.0.0"
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  mavenCentral()
                  google()
                  maven { url = uri("https://jitpack.io") }
                  maven { url = uri("https://s01.oss.sonatype.org/content/repositories/snapshots/") }
                  maven { url = uri("https://s01.oss.sonatype.org/content/repositories/releases/") }
              }
          }
          rootProject.name = "AuraMusic"
          include(":app")
          include(":innertube")
          include(":flow")
          include(":kugou")
          include(":lrclib")
          include(":kizzy")
          include(":lastfm")
          include(":betterlyrics")
          include(":simpmusic")
          include(":shazamkit")
          include(":rush")
          KOTLIN
          sed -i 's|tinypinyin = "2.0.3"|tinypinyin = "2.0.1"|g' gradle/libs.versions.toml
          ./gradlew assembleFossUniversalRelease --no-daemon --no-configuration-cache

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FossUniversalRelease
          path: app/build/outputs/apk/foss/Universal/release/*.apk